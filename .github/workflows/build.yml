# QA on PR and push. On push to main: build wheel/sdist, PyPI (token), GitHub Release.
# Requires repo secret PYPITOKENKEY: a PyPI API token (https://pypi.org/manage/account/)

name: build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.11"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  qa:
    name: QA (Lint & Test)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Run Quality Gate
        run: |
          uv sync --dev
          uv run ruff check .
          uv run ruff format --check .
          uv run pytest -v --timeout=30

  build-and-release:
    needs: qa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set unique PEP 440 version for PyPI
        env:
          # Unique per run; run_attempt avoids PyPI duplicate on workflow re-runs. No manual bumps.
          RELEASE_VERSION: 0.0.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          python3 << 'PY'
          import os
          import re
          from pathlib import Path

          v = os.environ["RELEASE_VERSION"]
          p = Path("pyproject.toml")
          text = p.read_text(encoding="utf-8")
          text, n = re.subn(
              r'(?m)^version = ".*"',
              f'version = "{v}"',
              text,
              count=1,
          )
          if n != 1:
              raise SystemExit(f"expected 1 version line, replaced {n}")
          p.write_text(text, encoding="utf-8")
          print("release_version =", v)
          PY
          {
            echo "release_version<<EOF"
            echo "$RELEASE_VERSION"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPITOKENKEY }}
          packages-dir: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.release_version }}
          name: "Release ${{ env.release_version }}"
          target_commitish: ${{ github.sha }}
          body: |
            ## Automated release
            - **PyPI version:** `${{ env.release_version }}`
            - **Commit:** `${{ github.sha }}`
            - **Workflow run:** `${{ github.run_id }}`
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: false
