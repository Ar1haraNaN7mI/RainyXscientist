# Publish to PyPI using trusted publishing (OIDC).
# Resolves a non-conflicting patch version (PyPI forbids reusing the same file).
# Run: Actions -> Publish PyPI -> Run workflow (default branch, usually main). Tags no longer
# auto-publish; if you use tags, create an Actions release workflow separately.
#
# One-time: https://docs.pypi.org/trusted-publishers/

name: Publish PyPI

on:
  workflow_dispatch:

concurrency:
  group: pypi-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
          cache-dependency-glob: "**/pyproject.toml"

      - name: Resolve next PyPI version
        id: v
        run: python scripts/pypi_next_version.py --write --github-output

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Commit and push version bump
        if: success() && steps.v.outputs.bump_needed == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          if git diff --staged --quiet; then
            echo "No staged change; nothing to commit."
            exit 0
          fi
          git commit -m "chore: set version to ${VERSION} (PyPI publish)"
          git push origin "HEAD:refs/heads/${{ github.ref_name }}"

        env:
          VERSION: ${{ steps.v.outputs.version }}
